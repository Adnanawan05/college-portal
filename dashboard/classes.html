<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes - SmartSchool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .students-table { width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--light-gray); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { font-weight: 600; color: var(--text-primary); }
        tbody tr:hover { background: var(--light-gray); }
        .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; font-weight: 500; }
        .btn-view { background: #E8F4FD; color: var(--primary-color); }
        .btn-edit { background: #FFF4E5; color: #E67E22; }
        .btn-delete { background: #FFE5E5; color: #E74C3C; }
        .page-actions { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>SmartSchool</span>
                </div>
            </div>
            <!-- Sidebar nav rendered by JS based on role -->
            <nav class="sidebar-menu" id="sidebarNav"></nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search classes..." id="searchInput" oninput="filterTable()">
                </div>
                <div class="top-bar-right">
                    <button class="icon-btn" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notifCount">0</span>
                    </button>
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <div class="user-info">
                            <h4 id="userName">User</h4>
                            <p id="userRole">Loading...</p>
                        </div>
                    </div>
                    <button class="icon-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="content-area">
                <div class="welcome-section">
                    <h1>Classes</h1>
                    <p>View all classes and their schedules.</p>
                </div>

                <div class="page-actions" id="addBtn" style="display:none;">
                    <button class="btn-add" onclick="alert('Add class functionality - connect to database')">
                        <i class="fas fa-plus"></i> Add Class
                    </button>
                </div>

                <div class="students-table">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Class Name</th>
                                <th>Teacher</th>
                                <th>Subject</th>
                                <th>Students</th>
                                <th>Schedule</th>
                                <th id="actionHeader">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="classesTableBody">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; color: #7F8C8D;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading classes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/common.js"></script>
    <script>
        let userRole = '';
        const demoClasses = [
            { id: 1, name: 'Grade 10A', teacher: 'Mr. Ahmad Khan', subject: 'Mathematics', students: 32, schedule: 'Mon-Fri 8:00 AM' },
            { id: 2, name: 'Grade 10B', teacher: 'Mrs. Fatima Ali', subject: 'Physics', students: 28, schedule: 'Mon-Fri 10:00 AM' },
            { id: 3, name: 'Grade 11A', teacher: 'Dr. Tariq Hassan', subject: 'Chemistry', students: 30, schedule: 'Tue-Thu 1:00 PM' },
            { id: 4, name: 'Grade 11B', teacher: 'Ms. Ayesha Siddiqui', subject: 'English', students: 25, schedule: 'Mon-Wed 9:00 AM' },
            { id: 5, name: 'Grade 12A', teacher: 'Mr. Bilal Raza', subject: 'Biology', students: 22, schedule: 'Fri 11:00 AM' },
        ];
        let allClasses = [...demoClasses];

        const SIDEBAR_NAVS = {
            admin: `
                <a href="admin.html" class="menu-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="students.html" class="menu-item"><i class="fas fa-user-graduate"></i><span>Students</span></a>
                <a href="teachers.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Teachers</span></a>
                <a href="classes.html" class="menu-item active"><i class="fas fa-book"></i><span>Classes</span></a>
                <a href="attendance.html" class="menu-item"><i class="fas fa-user-check"></i><span>Attendance</span></a>
                <a href="grades.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Grades</span></a>`,
            teacher: `
                <a href="teacher.html" class="menu-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="students.html" class="menu-item"><i class="fas fa-user-graduate"></i><span>Students</span></a>
                <a href="classes.html" class="menu-item active"><i class="fas fa-book"></i><span>Classes</span></a>
                <a href="attendance.html" class="menu-item"><i class="fas fa-user-check"></i><span>Attendance</span></a>
                <a href="grades.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Grades</span></a>`,
            student: `
                <a href="student.html" class="menu-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="classes.html" class="menu-item active"><i class="fas fa-book"></i><span>Classes</span></a>
                <a href="grades.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Grades</span></a>
                <a href="attendance.html" class="menu-item"><i class="fas fa-user-check"></i><span>Attendance</span></a>`,
            parent: `
                <a href="parent.html" class="menu-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="classes.html" class="menu-item active"><i class="fas fa-book"></i><span>Classes</span></a>
                <a href="grades.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Grades</span></a>
                <a href="attendance.html" class="menu-item"><i class="fas fa-user-check"></i><span>Attendance</span></a>`,
        };

        (async () => {
            const data = await checkAuth();
            if (!data) return;
            userRole = data.role;
            document.getElementById('userName').textContent = data.name;
            document.getElementById('userRole').textContent = data.role.charAt(0).toUpperCase() + data.role.slice(1);
            document.getElementById('userAvatar').textContent = data.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
            document.getElementById('sidebarNav').innerHTML = SIDEBAR_NAVS[data.role] || SIDEBAR_NAVS.student;

            // Only admin/teacher can see Edit/Delete; only admin can Add
            if (data.role === 'admin') {
                document.getElementById('addBtn').style.display = 'flex';
            }
            renderTable(allClasses);
            loadNotifications();
        })();

        function renderTable(classes) {
            const isAdmin = userRole === 'admin';
            const isTeacher = userRole === 'teacher';
            const canEdit = isAdmin || isTeacher;

            if (!canEdit) {
                document.getElementById('actionHeader').style.display = 'none';
            }

            document.getElementById('classesTableBody').innerHTML = classes.map(c => `
                <tr>
                    <td>#${c.id}</td>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.teacher}</td>
                    <td>${c.subject}</td>
                    <td>${c.students}</td>
                    <td>${c.schedule}</td>
                    ${canEdit ? `<td>
                        <button class="action-btn btn-view"><i class="fas fa-eye"></i> View</button>
                        ${isAdmin ? `<button class="action-btn btn-edit"><i class="fas fa-edit"></i> Edit</button>
                        <button class="action-btn btn-delete"><i class="fas fa-trash"></i></button>` : ''}
                    </td>` : '<td style="display:none"></td>'}
                </tr>
            `).join('');
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClasses.filter(c =>
                c.name.toLowerCase().includes(q) ||
                c.teacher.toLowerCase().includes(q) ||
                c.subject.toLowerCase().includes(q)
            );
            renderTable(filtered);
        }
    </script>
</body>
</html>
