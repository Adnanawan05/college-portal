<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers Management - SmartSchool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-actions { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-add { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: #2980b9; }
        .students-table { width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--light-gray); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { font-weight: 600; color: var(--text-primary); }
        tbody tr:hover { background: var(--light-gray); }
        .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; margin-right: 5px; font-weight: 500; }
        .btn-view { background: #E8F4FD; color: var(--primary-color); }
        .btn-edit { background: #FFF4E5; color: #E67E22; }
        .btn-delete { background: #FFE5E5; color: #E74C3C; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #7F8C8D; }
        .modal .form-group { margin-bottom: 16px; }
        .modal label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .modal input, .modal select { width: 100%; padding: 10px 14px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        .modal input:focus, .modal select:focus { border-color: var(--primary-color); }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-save { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; }
        .btn-cancel { background: var(--light-gray); color: var(--text-primary); border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #27AE60; color: white; padding: 14px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 2000; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #E74C3C; }
        .subject-badge { background: #E8F4FD; color: var(--primary-color); padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>SmartSchool</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="admin.html" class="menu-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="students.html" class="menu-item">
                    <i class="fas fa-user-graduate"></i>
                    <span>Students</span>
                </a>
                <a href="teachers.html" class="menu-item active">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Teachers</span>
                </a>
                <a href="classes.html" class="menu-item">
                    <i class="fas fa-book"></i>
                    <span>Classes</span>
                </a>
                <a href="attendance.html" class="menu-item">
                    <i class="fas fa-user-check"></i>
                    <span>Attendance</span>
                </a>
                <a href="grades.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Grades</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search teachers..." id="searchInput" oninput="filterTable()">
                </div>
                <div class="top-bar-right">
                    <button class="icon-btn" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notifCount">0</span>
                    </button>
                    <div class="user-profile">
                        <div class="user-avatar">JA</div>
                        <div class="user-info">
                            <h4 id="userName">Admin</h4>
                            <p>Administrator</p>
                        </div>
                    </div>
                    <button class="icon-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="content-area">
                <div class="welcome-section">
                    <h1>Teachers Management</h1>
                    <p>View and manage all teachers in the system.</p>
                </div>

                <div class="page-actions">
                    <button class="btn-add" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> Add Teacher
                    </button>
                </div>

                <div class="students-table">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Classes</th>
                                <th>Students</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teachersTableBody">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; color: #7F8C8D;">
                                    <i class="fas fa-spinner fa-spin"></i> Loading teachers...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Teacher Modal -->
    <div class="modal-overlay" id="teacherModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Teacher</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="teacherForm" onsubmit="saveTeacher(event)">
                <input type="hidden" id="editTeacherId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="teacherName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="teacherEmail" placeholder="Enter email address" required>
                </div>
                <div class="form-group">
                    <label id="passwordLabel">Password</label>
                    <input type="password" id="teacherPassword" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select id="teacherSubject" required>
                        <option value="">Select subject...</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="English">English</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Urdu">Urdu</option>
                        <option value="Islamiat">Islamiat</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save" id="saveBtn">Add Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../assets/js/common.js"></script>
    <script>
        let allTeachers = [];

        // Admin-only auth guard
        (async () => {
            const data = await checkAuthShared(['admin']);
            if (!data) return;
            document.getElementById('userName').textContent = data.name;
            loadTeachers();
            loadNotifications();
        })();

        async function loadTeachers() {
            try {
                const response = await fetch('../api/students.php?action=list_teachers', { cache: 'no-store' });
                const data = await response.json();
                if (data.success && data.teachers && data.teachers.length > 0) {
                    allTeachers = data.teachers;
                    renderTable(allTeachers);
                } else { showDemoData(); }
            } catch (e) { showDemoData(); }
        }

        function showDemoData() {
            allTeachers = [
                { id: 1, teacher_name: 'Mr. Ahmad Khan', email: 'ahmad@school.com', subject: 'Mathematics', total_classes: 5, total_students: 120 },
                { id: 2, teacher_name: 'Mrs. Fatima Ali', email: 'fatima@school.com', subject: 'Physics', total_classes: 4, total_students: 90 },
                { id: 3, teacher_name: 'Dr. Tariq Hassan', email: 'tariq@school.com', subject: 'Chemistry', total_classes: 3, total_students: 75 },
            ];
            renderTable(allTeachers);
        }

        function renderTable(teachers) {
            const tbody = document.getElementById('teachersTableBody');
            tbody.innerHTML = teachers.map(t => `
                <tr>
                    <td>#${t.id}</td>
                    <td><strong>${t.teacher_name}</strong></td>
                    <td>${t.email || 'N/A'}</td>
                    <td><span class="subject-badge">${t.subject}</span></td>
                    <td>${t.total_classes || 0}</td>
                    <td>${t.total_students || 0}</td>
                    <td>
                        <button class="action-btn btn-view" onclick="viewTeacher(${t.id})"><i class="fas fa-eye"></i> View</button>
                        <button class="action-btn btn-edit" onclick="editTeacher(${t.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteTeacher(${t.id}, '${t.teacher_name}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTeachers.filter(t =>
                t.teacher_name.toLowerCase().includes(q) ||
                t.subject.toLowerCase().includes(q) ||
                (t.email && t.email.toLowerCase().includes(q))
            );
            renderTable(filtered);
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Teacher';
            document.getElementById('saveBtn').textContent = 'Add Teacher';
            document.getElementById('teacherForm').reset();
            document.getElementById('editTeacherId').value = '';
            document.getElementById('teacherPassword').required = true;
            document.getElementById('passwordLabel').textContent = 'Password';
            document.getElementById('teacherModal').classList.add('active');
        }

        function editTeacher(id) {
            const t = allTeachers.find(x => x.id == id);
            if (!t) return;
            document.getElementById('modalTitle').textContent = 'Edit Teacher';
            document.getElementById('saveBtn').textContent = 'Save Changes';
            document.getElementById('editTeacherId').value = id;
            document.getElementById('teacherName').value = t.teacher_name;
            document.getElementById('teacherEmail').value = t.email || '';
            document.getElementById('teacherPassword').value = '';
            document.getElementById('teacherPassword').required = false;
            document.getElementById('passwordLabel').textContent = 'New Password (leave blank to keep current)';
            document.getElementById('teacherSubject').value = t.subject;
            document.getElementById('teacherModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('teacherModal').classList.remove('active');
        }

        async function saveTeacher(e) {
            e.preventDefault();
            const editId = document.getElementById('editTeacherId').value;
            const name = document.getElementById('teacherName').value;
            const email = document.getElementById('teacherEmail').value;
            const password = document.getElementById('teacherPassword').value;
            const subject = document.getElementById('teacherSubject').value;

            if (editId) {
                try {
                    const fd = new FormData();
                    fd.append('action', 'update_teacher');
                    fd.append('id', editId);
                    fd.append('name', name);
                    fd.append('email', email);
                    fd.append('subject', subject);
                    if (password) fd.append('password', password);
                    
                    const res = await fetch('../api/students.php', { method: 'POST', body: fd });
                    const data = await res.json();
                    
                    if (data.success) {
                        showToast('Teacher updated successfully!');
                        loadTeachers();
                    } else {
                        showToast(data.message || 'Update failed', true);
                    }
                } catch(e) {
                    showToast('Connection error', true);
                }
            } else {
                try {
                    const fd = new FormData();
                    fd.append('action', 'signup');
                    fd.append('name', name);
                    fd.append('email', email);
                    fd.append('password', password);
                    fd.append('role', 'teacher');
                    fd.append('phone', '');
                    fd.append('subject', subject);
                    const res = await fetch('../api/auth.php', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.success) {
                        showToast('Teacher added successfully!');
                        loadTeachers();
                    } else {
                        showToast(data.message || 'Failed to add teacher', true);
                    }
                } catch(err) {
                    showToast('Connection error', true);
                }
            }
            closeModal();
        }

        function viewTeacher(id) {
            const t = allTeachers.find(x => x.id == id);
            if (!t) return;
            alert(`Teacher Details\n\nName: ${t.teacher_name}\nEmail: ${t.email || 'N/A'}\nSubject: ${t.subject}\nClasses: ${t.total_classes || 0}\nStudents: ${t.total_students || 0}`);
        }

        async function deleteTeacher(id, name) {
            if (!confirm(`Are you sure you want to delete teacher "${name}"?`)) return;
            
            try {
                const fd = new FormData();
                fd.append('action', 'delete_teacher');
                fd.append('id', id);
                const res = await fetch('../api/students.php', { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Teacher deleted successfully!');
                    loadTeachers();
                } else {
                    showToast(data.message || 'Deletion failed', true);
                }
            } catch(e) {
                showToast('Connection error', true);
            }
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('teacherModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
